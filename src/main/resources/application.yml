spring:
  application:
    name: gitsolve-ai
  threads:
    virtual:
      enabled: true
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  thymeleaf:
    cache: false
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gitsolve}
    username: ${DATABASE_USER:gitsolve}
    password: ${DATABASE_PASSWORD:gitsolve}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

gitsolve:
  github:
    app-token: ${GITHUB_APP_TOKEN:}
    max-repos-per-run: 2
    max-issues-per-repo: 5
    # target-repos: pin specific repos to scan (bypasses LLM scout entirely)
    # example:
    #   target-repos:
    #     - apache/commons-lang
    #     - javaparser/javaparser
    target-repos:
      - apache/commons-lang
      - javaparser/javaparser
      - diffplug/spotless
    # star-range: used when target-repos is empty — searches repos in this star range
    # format: "MIN..MAX" e.g. "100..3000" — avoids always picking the same mega-repos
    star-range: "100..3000"
  llm:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    lite-model: claude-haiku-4-5-20251001
    power-model: claude-sonnet-4-5-20251001
    max-tokens-per-run: 500000
    max-iterations-per-fix: 3
  docker:
    image: eclipse-temurin:21-jdk
    mem-limit-mb: 1024
    cpu-quota: 50000
    build-timeout-seconds: 600
  schedule:
    cron: "0 0 0 * * *"
  repo-cache:
    base-dir: ${user.home}/.gitsolve-repos
    update-existing: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    com.gitsolve: DEBUG
    org.flywaydb: INFO
