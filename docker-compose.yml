# docker-compose.yml
# Local development environment for GitSolve AI.
# This is NOT the build sandbox — that runs inside Docker via docker-java at runtime.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gitsolve
      POSTGRES_USER: gitsolve
      POSTGRES_PASSWORD: gitsolve
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitsolve"]
      interval: 5s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    ports:
      - "4318:4318"   # OTLP HTTP
      - "4317:4317"   # OTLP gRPC
    volumes:
      - ./otel-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - postgres

volumes:
  pgdata:
