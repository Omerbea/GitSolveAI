name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Required by @NotBlank validation — placeholder is sufficient for CI builds
      # Real keys are only needed for live LLM calls (not exercised in unit/integration tests)
      GITHUB_APP_TOKEN: placeholder-ci-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test
        run: mvn clean verify
        # Ubuntu-latest runners have Docker available; Testcontainers uses the default socket.
        # DOCKER_HOST is not set here — Testcontainers auto-detects the Docker daemon on Linux.
